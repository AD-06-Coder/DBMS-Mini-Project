<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Placement Drives — PlaceTrack</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css?v=2">
    <link rel="stylesheet" href="../css/animations.css?v=2">

    <style>
        .drives-hero {
            padding-top: 12rem;
            padding-bottom: 6rem;
            position: relative;
        }

        .drives-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 3rem;
            padding-bottom: 8rem;
        }

        .company-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 2.5rem;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }

        .company-card:hover {
            transform: translateY(-15px);
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--primary);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), inset 0 0 0 1px rgba(99, 102, 241, 0.2);
        }

        .company-logo {
            width: 80px;
            height: 80px;
            border-radius: 16px;
            background: rgba(2, 6, 23, 0.8);
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: 900;
            margin-bottom: 2rem;
            transition: transform 0.3s ease;
        }

        .company-card:hover .company-logo {
            transform: scale(1.1) rotate(5deg);
        }

        .package-tag {
            background: linear-gradient(90deg, #10b981 0%, #059669 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2rem;
            font-weight: 900;
            display: block;
            margin: 1.5rem 0;
            letter-spacing: -1px;
        }
    </style>
</head>

<body>
    <div class="cinematic-bg"></div>
    <div id="three-bg-container"></div>

    <nav>
        <div class="container nav-container fade-in-load">
            <a href="index.html" class="logo">Place<span style="color:var(--primary)">Track</span></a>
            <div class="nav-links">
                <a href="dashboard.html">Dashboard</a>
                <a href="drives.html" class="active">Drives</a>
                <a href="eligibility.html">Eligibility</a>
            </div>
            <button class="exit-portal-btn" onclick="logoutUser('student')">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
                <span>Log out</span>
            </button>
    </nav>

    <header class="drives-hero container fade-in-load">
        <h1 class="huge-title">Placement <span class="text-gradient">Drives.</span></h1>
        <p class="text-muted" style="font-size: 1.25rem; max-width: 600px;">
            Companies currently hiring from our campus. Check eligibility and apply directly.
        </p>
    </header>

    <div class="container mb-8 fade-in-load" style="animation-delay: 0.1s;">
        <div style="background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border); border-radius: 1rem; padding: 1.5rem; display: flex; gap: 1rem; align-items: center; flex-wrap: wrap;">
            <input type="text" id="filter-search" placeholder="Search companies or roles..." class="web3-input" style="flex: 1; min-width: 200px; margin: 0; padding: 0.75rem;" oninput="applyFilters()">
            <input type="number" id="filter-package" placeholder="Min LPA" class="web3-input" style="width: 120px; margin: 0; padding: 0.75rem;" oninput="applyFilters()">
            <label style="display: flex; align-items: center; gap: 0.5rem; color: var(--text-muted); cursor: pointer;">
                <input type="checkbox" id="filter-eligible" onchange="loadDrives()" style="width: 1.2rem; height: 1.2rem; accent-color: var(--primary);">
                Show only eligible drives
            </label>
        </div>
    </div>

    <main class="container stagger-grid drives-grid" id="drives-container">
        <div class="company-card" style="text-align:center; padding:3rem; grid-column: 1/-1;">
            <p class="text-muted">Loading drives...</p>
        </div>
    </main>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.29/bundled/lenis.min.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/threeBackground.js"></script>
    <script src="../js/scrollAnimations.js"></script>
    <script src="../js/interactions.js"></script>

    <script>
        const API = 'http://localhost:3000/api';
        const auth = JSON.parse(localStorage.getItem('studentAuth'));
        if (!auth) { window.location.href = 'auth-student.html'; }

        async function applyToDrive(driveId, companyName) {
            try {
                const res = await fetch(`${API}/drives/${driveId}/apply`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ studentId: auth.id })
                });
                const data = await res.json();
                showToast(data.message, data.success ? 'success' : 'error');
                if (data.success) loadDrives(); // refresh
            } catch (err) {
                showToast('Failed to apply', 'error');
            }
        }

        async function checkEligibility(driveId) {
            try {
                const res = await fetch(`${API}/eligibility/check`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ studentId: auth.id, driveId })
                });
                const data = await res.json();
                showToast(data.reason, data.eligible ? 'success' : 'error');
            } catch (err) {
                showToast('Failed to check eligibility', 'error');
            }
        }

        let allDrivesData = [];

        async function loadDrives() {
            const isEligibleOnly = document.getElementById('filter-eligible');
            const endpoint = isEligibleOnly && isEligibleOnly.checked ? `${API}/student/eligible-drives?studentId=${auth.id}` : `${API}/drives`;
            try {
                const res = await fetch(endpoint);
                allDrivesData = await res.json();
                applyFilters();
            } catch (err) {
                console.error('Failed to load drives:', err);
                document.getElementById('drives-container').innerHTML = '<div class="company-card" style="text-align:center; padding:3rem; grid-column:1/-1;"><p class="text-muted">Failed to load drives.</p></div>';
            }
        }

        function applyFilters() {
            const container = document.getElementById('drives-container');
            const searchInput = document.getElementById('filter-search');
            let searchStr = searchInput ? searchInput.value.toLowerCase() : '';
            const packageInput = document.getElementById('filter-package');
            let minLPA = packageInput && packageInput.value ? parseFloat(packageInput.value) : 0;

            const filtered = allDrivesData.filter(d => {
                const company = (d.CompanyName || '').toLowerCase();
                const role = (d.Role || '').toLowerCase();
                const matchesSearch = company.includes(searchStr) || role.includes(searchStr);
                const matchesPackage = parseFloat(d.PackageLPA || 0) >= minLPA;
                return matchesSearch && matchesPackage;
            });

            if (filtered.length === 0) {
                container.innerHTML = '<div class="company-card" style="text-align:center; padding:3rem; grid-column:1/-1;"><p class="text-muted">No matching drives found.</p></div>';
                return;
            }

            container.innerHTML = filtered.map(d => {
                const deadline = new Date(d.Deadline).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                return `
                <article class="company-card fade-in-load">
                    <div class="glow-border"></div>
                    <div class="company-logo" style="color: ${d.LogoColor || '#6366f1'};">${d.LogoInitial || d.CompanyName[0]}</div>
                    <h2 style="font-size: 2rem; margin-bottom: 0.5rem;">${d.CompanyName}</h2>
                    <p class="text-muted">${d.Description || d.Role}</p>
                    <div class="package-tag">${parseFloat(d.PackageLPA).toFixed(1)} LPA</div>
                    <p class="text-muted" style="font-size:0.8rem; margin-top:0.5rem;">Min CGPA: ${parseFloat(d.MinCGPA).toFixed(1)} · Branches: ${d.AllowedBranches || 'All'}</p>
                    <div class="flex justify-between items-center mt-8">
                        <span class="text-muted" style="font-size: 0.85rem; text-transform: uppercase;">Deadline: ${deadline}</span>
                        <div style="display:flex; gap:0.5rem;">
                            <button class="btn btn-outline magnetic-btn" onclick="checkEligibility(${d.DriveID})">Check</button>
                            <button class="btn btn-primary magnetic-btn" onclick="applyToDrive(${d.DriveID}, '${d.CompanyName}')">Apply</button>
                        </div>
                    </div>
                </article>`;
            }).join('');
        }

        loadDrives();
    </script>
</body>

</html>
